version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lacima_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-lacima_db}
      POSTGRES_USER: ${DB_USER:-lacima_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lacima_secret_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - lacima_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lacima_user} -d ${DB_NAME:-lacima_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lacima_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-lacima_db}
      DB_USER: ${DB_USER:-lacima_user}
      DB_PASSWORD: ${DB_PASSWORD:-lacima_secret_2024}
      JWT_SECRET: ${JWT_SECRET:-lacima_jwt_super_secret_key_2024}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN:-stub_token}
      WHATSAPP_PHONE_ID: ${WHATSAPP_PHONE_ID:-stub_phone_id}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-lacima_verify_token}
      MATIAS_API_KEY: ${MATIAS_API_KEY:-stub_matias_key}
      MATIAS_API_URL: ${MATIAS_API_URL:-https://api.matias-api.com/v1}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "4000:4000"
    networks:
      - lacima_network
    volumes:
      - ./backend/src:/app/src

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lacima_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "3000:3000"
    networks:
      - lacima_network

volumes:
  postgres_data:
    driver: local

networks:
  lacima_network:
    driver: bridge
